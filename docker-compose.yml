# NetWatch Monitoring Platform - Docker Compose Configuration
#
# 使用方法:
#   1. docker-compose up -d
#   2. 访问 http://localhost:3000
#
# 前端默认使用真实后端API，无需额外配置

version: '3.8'

services:
  # 后端 API 服务（使用 JSON 文件存储）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netwatch-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - netwatch-network

  # 前端 Web 应用（默认使用真实 API）
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: netwatch-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - netwatch-network

networks:
  netwatch-network:
    driver: bridge
